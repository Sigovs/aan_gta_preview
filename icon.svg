<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="ground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#16181c" />
      <stop offset="1" stop-color="#0c0d0f" />
    </linearGradient>
    <linearGradient id="metal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#eef2f5" />
      <stop offset="0.55" stop-color="#c6ccd2" />
      <stop offset="1" stop-color="#9a9ea4" />
    </linearGradient>
  </defs>
  <rect width="64" height="64" fill="url(#ground)" />
  <rect x="3.5" y="3.5" width="57" height="57" fill="none" stroke="#2a333b" stroke-width="1" />
  <!-- Platinum grotesk on cool ink, closed by the oxblood full stop — the site's
       signature, rendered at 64px. Was gold Georgia on warm charcoal: the retired
       palette and the retired serif, sitting in the browser tab. -->
  <text x="30" y="41" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-weight="700" font-size="22" letter-spacing="-0.5" fill="url(#metal)">GTA</text>
  <circle cx="50" cy="39" r="2.6" fill="#96252d" />
</svg>
